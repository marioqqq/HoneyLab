services:
  # Common
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - 9443:9443
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
    volumes:
      - portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - management
    restart: unless-stopped

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
      - WATCHTOWER_MONITOR_ONLY=false
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 6 0 * * 0
      - WATCHTOWER_NOTIFICATIONS=gotify
      - WATCHTOWER_NOTIFICATION_GOTIFY_URL=${GOTIFY_URL}
      - WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN=${GOTIFY_TOKEN}
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=SRV-Management
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - management
    restart: unless-stopped

  # Specific
  adguard_home:
    container_name: adguard_home
    image: adguard/adguardhome:latest
    ports:
      - ${IP}:53:53/tcp
      - ${IP}:53:53/udp
      - 3000:3000
    volumes:
      - ./adguard_home/work:/opt/adguardhome/work
      - ./adguard_home/conf:/opt/adguardhome/conf
    networks:
      - management
    restart: unless-stopped

  linux_update_dashboard:
    container_name: linux_update_dashboard
    image: ghcr.io/theduffman85/linux-update-dashboard:latest
    ports:
      - 3001:3001
    environment:
      - LUDASH_ENCRYPTION_KEY=${LUDASH_ENCRYPTION_KEY}
      - LUDASH_DB_PATH=/data/dashboard.db
      - NODE_ENV=production
    volumes:
      - ./linux_update_dashboard:/data
    networks:
      - management
    restart: unless-stopped

  nginx_proxy_manager:
    container_name: nginx_proxy_manager
    image: jc21/nginx-proxy-manager:latest
    ports:
      - 80:80
      - 81:81
      - 443:443
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
    volumes:
      - ./nginx_proxy_manager/data:/data
      - ./nginx_proxy_manager/letsencrypt:/etc/letsencrypt
    networks:
      - management
    restart: unless-stopped
  
  rackpeek:
    container_name: rackpeek
    image: aptacode/rackpeek:latest
    ports:
      - 8080:8080
    volumes:
      - ./rackpeek:/app/config
    user: 0:0
    networks:
      - management
    restart: unless-stopped
  
  uptime_kuma:
    container_name: uptime_kuma
    image: louislam/uptime-kuma:2
    volumes:
      - ./uptime_kuma:/app/data
    ports:
      - 3002:3001
    networks:
      - management
    restart: unless-stopped

networks:
  management:
    name: management
    driver: bridge

volumes:
  portainer:
    name: portainer
    driver: local